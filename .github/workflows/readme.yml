name: Auto-update README

# Regenerates the README's plugin table/install list from the manifests on every push,
# and commits the result back so the README stays in sync by itself. The auto-commit uses
# "[skip ci]" so it never re-triggers this workflow (no loop).

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/marketplace.json'
      - 'plugins/**/.claude-plugin/plugin.json'
      - 'scripts/gen-readme.mjs'
      - 'README.md'
      - '.github/workflows/readme.yml'

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    # Belt-and-suspenders: never act on the bot's own regen commit.
    if: ${{ !contains(github.event.head_commit.message, 'regenerate README') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate README from manifests
        run: node scripts/gen-readme.mjs
      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "README already up to date."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: regenerate README from manifests [skip ci]"
          git push
